name: Auto Date

on:
  schedule:
    - cron: '0 2 * * 1,3,5'
    - cron: '0 7 * * 2,4'
    - cron: '0 13 * * 0,6'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Random skip
        id: skip_check
        run: |
          RAND=$((RANDOM % 3))
          if [ $RAND -eq 0 ]; then
            echo "Skipping today"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run commit bot and push
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          info="$(date '+%A, %d %B %Y - %H:%M WIB')"
          echo "$info" >> date.txt
          git config user.name "seanwrds"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          branch=$(git rev-parse --abbrev-ref HEAD)
          git add note.txt
          git commit -m "$info"
          git pull --rebase origin "$branch"
          git push origin "$branch"
